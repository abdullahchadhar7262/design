<div class="wrapper">
  <svg viewBox="0 0 300 500" class="card-shape">
    
    <!-- Base Card -->
    <rect x="0" y="0" width="300" height="500" rx="30" ry="30" class="base"/>

    <!-- Top Left Cut Shape -->
    <polygon points="0,0 120,0 0,120" class="light"/>

    <!-- Top Right Cut Shape -->
    <polygon points="300,0 180,0 300,120" class="light"/>

    <!-- Bottom Left Cut -->
    <polygon points="0,500 120,500 0,380" class="dark"/>

    <!-- Bottom Right Cut -->
    <polygon points="300,500 180,500 300,380" class="dark"/>

  </svg>
</div>
